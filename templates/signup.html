<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='animation.css') }}">
</head>
<body>

    <!-- Added Background -->
    <div class="background">
        <canvas id="bubbleCanvas"></canvas>
    </div>

    <div class="container">
        <h2>Create Account</h2>
        <p style="color: #ccc; font-size: 14px; margin-bottom: 10px;">Join the community and track your habits!</p>
        
        <input id="un" placeholder="Choose a username">
        <input id="pw" type="password" placeholder="Create a password">
        
        <button onclick="signup()">Signup</button>
        
        <p id="msg" style="margin-top: 15px; font-size: 14px;"></p>
        
        <a href="/" class="link-btn">Already have an account? Login</a>
    </div>

    <script>
        const canvas = document.getElementById("bubbleCanvas");
        const ctx = canvas.getContext("2d");

        let bubbles = [];
        const bubbleCount = 70;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        class Bubble {
            constructor(savedData = null) {
                if (savedData) {
                    Object.assign(this, savedData);
                } else {
                    this.reset();
                }
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 18 + 6;
                this.vx = (Math.random() - 0.5) * 0.25;
                this.vy = (Math.random() - 0.5) * 0.25;
                this.opacity = Math.random() * 0.3 + 0.2;
                this.changeTimer = Math.random() * 140 + 80;
                this.tx = (Math.random() - 0.5) * 0.5;
                this.ty = (Math.random() - 0.5) * 0.5;
                const colors = [[80, 160, 255], [120, 140, 255], [100, 180, 220]];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.changeTimer--;
                if (this.changeTimer <= 0) {
                    this.tx = (Math.random() - 0.5) * 0.5;
                    this.ty = (Math.random() - 0.5) * 0.5;
                    this.changeTimer = Math.random() * 180 + 100;
                }
                this.vx += (this.tx - this.vx) * 0.02;
                this.vy += (this.ty - this.vy) * 0.02;
                this.vy -= 0.002;
                this.vx *= 0.995;
                this.vy *= 0.995;
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -this.radius) this.x = canvas.width + this.radius;
                if (this.x > canvas.width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = canvas.height + this.radius;
                if (this.y > canvas.height + this.radius) this.y = -this.radius;
            }

            draw() {
                const [r, g, b] = this.color;
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, `rgba(${r},${g},${b},${this.opacity})`);
                gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.shadowBlur = 25;
                ctx.shadowColor = `rgba(${r},${g},${b},0.5)`;
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function init() {
            const savedBubbles = localStorage.getItem("bubbleState");
            if (savedBubbles) {
                const data = JSON.parse(savedBubbles);
                bubbles = data.map(d => new Bubble(d));
            } else {
                for (let i = 0; i < bubbleCount; i++) {
                    bubbles.push(new Bubble());
                }
            }
        }

        function animate() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.3)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            bubbles.forEach(b => {
                b.update();
                b.draw();
            });

            // Save state occasionally to keep positions synced across navigation
            if (Math.random() > 0.98) {
                localStorage.setItem("bubbleState", JSON.stringify(bubbles));
            }

            requestAnimationFrame(animate);
        }

        init();
        animate();

        function signup() {
            const user = document.getElementById('un').value.trim();
            const pass = document.getElementById('pw').value.trim();
            const msgBox = document.getElementById('msg');

            if (!user || !pass) {
                msgBox.style.color = "red";
                msgBox.innerText = "Username and password are required.";
                return;
            }

            fetch("/api/signup", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if (data.message === "Signup successful") {
                    localStorage.setItem("bubbleState", JSON.stringify(bubbles)); // Final sync
                    msgBox.style.color = "green";
                    msgBox.innerText = "Account created! Redirecting to login...";
                    setTimeout(() => { window.location.href = "/"; }, 1500);
                } else {
                    msgBox.style.color = "red";
                    msgBox.innerText = data.message;
                }
            })
            .catch(err => {
                msgBox.style.color = "red";
                msgBox.innerText = "An error occurred. Please try again.";
            });
        }
    </script>
</body>
</html>
