<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <h2 id="uName">Loading...</h2>
        <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 15px;">
            <a href="#" id="fwerL" class="stat-link">0 Followers</a>
            <a href="#" id="fwingL" class="stat-link">0 Following</a>
        </div>
        <div id="btnArea" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;">
            <button id="fBtn" onclick="act('follow')" style="background:#34a853; display:none;">Follow</button>
            <button id="unfBtn" onclick="act('unfollow')" style="background:#d93025; display:none;">Unfollow</button>
            <button id="remBtn" onclick="act('remove_follower')" style="background:#5f6368; display:none;">Remove Follower</button>
        </div>
        <hr>
        <h3>Habits</h3>
        <ul id="hList"></ul>
        <button onclick="window.location.href='/dashboard'">Back Home</button>
    </div>
    <script>
        const token = localStorage.getItem("token"), myName = localStorage.getItem("username");
        const target = window.location.pathname.split('/').pop();

        function act(type) {
            fetch(`/api/${type}/${target}`, {method:"POST", headers:{"Authorization":"Bearer "+token}})
            .then(res => res.json())
            .then(data => {
                if(data.message === "Request already sent") {
                    alert("Request already sent!");
                } else {
                    location.reload();
                }
            });
        }

        function load() {
            fetch("/api/user_info/"+target, {headers:{"Authorization":"Bearer "+token}})
            .then(res => res.json()).then(data => {
                document.getElementById("uName").innerText = data.username;
                document.getElementById("fwerL").innerText = data.follower_count + " Followers";
                document.getElementById("fwerL").href = `/user/${target}/followers`;
                document.getElementById("fwingL").innerText = data.following_count + " Following";
                document.getElementById("fwingL").href = `/user/${target}/following`;
                
                if(target.toLowerCase() !== myName.toLowerCase()) {
                    if(data.is_following) {
                        document.getElementById("unfBtn").style.display = "block";
                    } else if(data.has_requested) {
                        const f = document.getElementById("fBtn");
                        f.innerText = "Requested";
                        f.style.background = "#9aa0a6";
                        f.style.display = "block";
                        f.disabled = true;
                    } else {
                        document.getElementById("fBtn").style.display = "block";
                    }
                    if(data.follows_me) document.getElementById("remBtn").style.display = "block";
                }
            });

            fetch("/api/search?username="+target, {headers:{"Authorization":"Bearer "+token}})
            .then(res => res.json()).then(data => {
                const l = document.getElementById("hList");
                if(data.message === "Private") l.innerHTML = "<li style='text-align:center; background:#eee;'>🔒 Private Account. Follow to view habits.</li>";
                else {
                    l.innerHTML = data.habits.length ? "" : "<li>No habits.</li>";
                    data.habits.forEach(h => {
                        let li = document.createElement("li");
                        li.innerText = h.name + (h.completed ? " ✅" : " ❌");
                        l.appendChild(li);
                    });
                }
            });
        }
        window.onload = load;
    </script>
</body>
</html>
