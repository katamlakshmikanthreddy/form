<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <h2 id="uName">Loading...</h2>
        
        <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 15px;">
            <a href="#" id="fwerL" class="stat-link">0 Followers</a>
            <a href="#" id="fwingL" class="stat-link">0 Following</a>
        </div>

        <button id="fBtn" onclick="follow()" style="background: #34a853; display: none; margin-bottom: 15px;">Follow User</button>
        
        <hr>
        <h3>Public Habits</h3>
        <ul id="hList"></ul>
        <button onclick="window.location.href='/dashboard'">Back Home</button>
    </div>

    <script>
        const token = localStorage.getItem("token");
        const target = window.location.pathname.split('/').pop();

        function follow() {
            fetch("/api/follow/"+target, {method: "POST", headers: {"Authorization": "Bearer "+token}})
            .then(() => location.reload());
        }

        fetch("/api/user_info/"+target, {headers: {"Authorization": "Bearer "+token}})
        .then(res => res.json()).then(data => {
            document.getElementById("uName").innerText = data.username;
            document.getElementById("fwerL").innerText = data.follower_count + " Followers";
            document.getElementById("fwerL").href = `/user/${target}/followers`;
            document.getElementById("fwingL").innerText = data.following_count + " Following";
            document.getElementById("fwingL").href = `/user/${target}/following`;
            if(data.is_following === false) document.getElementById("fBtn").style.display = "block";
        });

        fetch("/api/search?username="+target, {headers: {"Authorization": "Bearer "+token}})
        .then(res => res.json()).then(data => {
            const l = document.getElementById("hList");
            if(data.habits.length === 0) l.innerHTML = "<li>No habits to show.</li>";
            data.habits.forEach(h => {
                let li = document.createElement("li");
                li.innerText = h.name + (h.completed ? " ✅" : " ❌");
                l.appendChild(li);
            });
        });
    </script>
</body>
</html>
