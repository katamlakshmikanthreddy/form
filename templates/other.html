<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <h2 id="uName">Loading...</h2>
        <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 15px;">
            <a href="#" id="fwerL" class="stat-link">0 Followers</a>
            <a href="#" id="fwingL" class="stat-link">0 Following</a>
        </div>
        <div id="btnArea" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;">
            <button id="fBtn" onclick="act('follow')" style="background:#34a853; display:none;">Follow</button>
            <button id="unfBtn" onclick="act('unfollow')" style="background:#d93025; display:none;">Unfollow</button>
            <button id="remBtn" onclick="act('remove_follower')" style="background:#5f6368; display:none;">Remove Follower</button>
        </div>
        <hr>
        <h3>Habits</h3>
        <ul id="hList"></ul>
        <button onclick="window.location.href='/dashboard'">Back Home</button>
    </div>

    <script>
        const token = localStorage.getItem("token"), myName = localStorage.getItem("username");
        const target = window.location.pathname.split('/').pop();

        function act(type) {
            fetch(`/api/${type}/${target}`, {
                method: "POST", 
                headers: {"Authorization": "Bearer " + token}
            })
            .then(res => res.json())
            .then(data => {
                if(data.message === "Request already sent") alert(data.message);
                else location.reload();
            });
        }

        function sendRemind(habit) {
            fetch("/api/remind", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json", 
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({target: target, habit: habit})
            })
            .then(res => res.json())
            .then(data => alert(data.message));
        }

        function load() {
            fetch("/api/user_info/" + target, {
                headers: {"Authorization": "Bearer " + token}
            })
            .then(res => res.json())
            .then(userData => {
                document.getElementById("uName").innerText = userData.username;
                
                const fwerL = document.getElementById("fwerL");
                fwerL.innerText = userData.follower_count + " Followers";
                fwerL.href = `/user/${target}/followers`;
                
                const fwingL = document.getElementById("fwingL");
                fwingL.innerText = userData.following_count + " Following";
                fwingL.href = `/user/${target}/following`;
                
                // Button Logic
                if(target.toLowerCase() !== myName.toLowerCase()) {
                    if(userData.is_following) {
                        document.getElementById("unfBtn").style.display = "block";
                    } else if(userData.has_requested) {
                        const b = document.getElementById("fBtn");
                        b.innerText = "Requested"; 
                        b.disabled = true; 
                        b.style.display = "block"; 
                        b.style.background = "#999";
                    } else {
                        document.getElementById("fBtn").style.display = "block";
                    }
                    
                    if(userData.follows_me) {
                        document.getElementById("remBtn").style.display = "block";
                    }

                    // Mutual Follow Check for Message Button
                    if(userData.is_following && userData.follows_me) {
                        let mBtn = document.createElement("button");
                        mBtn.innerText = "Message";
                        mBtn.style.background = "#1a73e8";
                        mBtn.onclick = () => window.location.href = '/chat/' + target;
                        document.getElementById("btnArea").appendChild(mBtn);
                    }
                }

                // Habit Logic
                fetch("/api/search?username=" + target, {
                    headers: {"Authorization": "Bearer " + token}
                })
                .then(res => res.json())
                .then(hData => {
                    const l = document.getElementById("hList");
                    if(hData.message === "Private") {
                        l.innerHTML = "<li style='text-align:center; background:#eee;'>🔒 Private Account</li>";
                    } else {
                        l.innerHTML = hData.habits.length ? "" : "<li>No habits.</li>";
                        hData.habits.forEach(h => {
                            let li = document.createElement("li");
                            li.style.display = "flex";
                            li.style.justifyContent = "space-between";
                            li.style.alignItems = "center";
                            
                            li.innerHTML = `<span>${h.name} ${h.completed ? '✅' : '❌'}</span>`;
                            
                            if(userData.is_private && !h.completed) {
                                let b = document.createElement("button");
                                b.innerText = "Remind"; 
                                b.style.width = "auto"; b.style.margin = "0";
                                b.style.padding = "5px 10px"; b.style.fontSize = "10px";
                                b.onclick = () => sendRemind(h.name);
                                li.appendChild(b);
                            }
                            l.appendChild(li);
                        });
                    }
                });
            })
            .catch(err => {
                console.error("Error loading profile:", err);
                document.getElementById("uName").innerText = "Error loading user";
            });
        }
        
        window.onload = load;
    </script>
</body>
</html>
