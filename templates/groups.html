<!DOCTYPE html>
<html>
<head>
    <title>Groups</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2>Your Groups</h2>
            <button onclick="window.location.href='/new_group'" style="width: 40px; height: 40px; border-radius: 50%; font-size: 20px;">+</button>
        </div>
        <ul id="groupList" style="list-style: none; padding: 0;"></ul>
        <button onclick="window.location.href='/chats'" style="background: #5f6368;">Back to Chats</button>
    </div>
    <script>
        const token = localStorage.getItem("token");
        fetch("/api/groups", { headers: {"Authorization": "Bearer "+token} })
        .then(res => res.json()).then(data => {
            const list = document.getElementById("groupList");
            data.forEach(g => {
                let li = document.createElement("li");
                li.style.cursor = "pointer"; li.style.padding = "10px"; li.style.borderBottom = "1px solid #eee";
                li.onclick = () => window.location.href = '/group/' + g.id;
                li.innerHTML = `
                    <div style="text-align: left;">
                        <strong>${g.name}</strong><br>
                        <small style="color:#666">${g.last_sender ? g.last_sender + ': ' : ''}${g.last_msg}</small>
                    </div>`;
                list.appendChild(li);
            });
        });
    </script>
</body>
</html>
