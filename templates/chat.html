<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .box { height: 350px; overflow-y: auto; border: 1px solid #eee; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #fdfdfd; border-radius: 8px; }
        .m { padding: 8px 12px; border-radius: 15px; font-size: 14px; max-width: 70%; }
        .me { align-self: flex-end; background: #1a73e8; color: white; }
        .them { align-self: flex-start; background: #e4e6eb; color: black; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
            <button onclick="window.location.href='/chats'" style="width: auto; padding: 5px 15px; margin: 0;">Back</button>
            <h3 id="cName" style="margin: 0;">Chat</h3>
        </div>
        <div class="box" id="box"></div>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <input id="msg" placeholder="Type message..." style="margin: 0;">
            <button onclick="send()" style="width: 80px; margin: 0;">Send</button>
        </div>
    </div>
    <script>
        const token = localStorage.getItem("token"), target = window.location.pathname.split('/').pop();
        document.getElementById("cName").innerText = target;
        function load() {
            fetch(`/api/messages/${target}`, { headers: {"Authorization": "Bearer "+token} })
            .then(res => res.json()).then(data => {
                const b = document.getElementById("box"); b.innerHTML = "";
                data.forEach(m => {
                    let d = document.createElement("div"); d.className = `m ${m.is_me ? 'me' : 'them'}`;
                    d.innerText = m.content; b.appendChild(d);
                });
                b.scrollTop = b.scrollHeight;
            });
        }
        function send() {
            const val = document.getElementById("msg").value; if(!val) return;
            fetch(`/api/messages/${target}`, {
                method: "POST", headers: {"Content-Type": "application/json", "Authorization": "Bearer "+token},
                body: JSON.stringify({content: val})
            }).then(() => { document.getElementById("msg").value = ""; load(); });
        }
        setInterval(load, 3000); load();
    </script>
</body>
</html>
