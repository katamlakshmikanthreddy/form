<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="dispUser">Dashboard</h2>
            <button onclick="window.location.href='/notifications'" style="width: auto; background: #fb923c; padding: 5px 10px;">🔔 Notifications</button>
        </div>

        <div style="margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px;">
            <span>Public</span>
            <label class="switch">
                <input type="checkbox" id="privacyToggle" onchange="updatePrivacy()">
                <span class="slider"></span>
            </label>
            <span>Private</span>
        </div>

        <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 20px;">
            <a href="#" id="fwerL" class="stat-link">0 Followers</a>
            <a href="#" id="fwingL" class="stat-link">0 Following</a>
        </div>

        <div style="display: flex; gap: 5px;">
            <input id="sIn" placeholder="Search user...">
            <button onclick="doSearch()" style="width: 80px; margin-top:10px;">Search</button>
        </div>
        <hr>
        <h3>My Habits</h3>
        <div style="display: flex; gap: 10px;">
            <input id="hIn" placeholder="New habit name...">
            <button onclick="addH()" style="width: 80px; margin-top:10px;">Add</button>
        </div>
        <ul id="list"></ul>
        <button onclick="localStorage.clear(); window.location.href='/'" class="delete-btn">Logout</button>
    </div>

    <script>
        const token = localStorage.getItem("token");
        const myName = localStorage.getItem("username");
        if(!token || !myName) window.location.href = "/";

        function doSearch() {
            const user = document.getElementById('sIn').value.trim();
            if(!user) return alert("Please enter a username");
            window.location.href = '/other/' + user;
        }

        function updatePrivacy() {
            fetch("/api/user/privacy", {
                method: "POST",
                headers: {"Content-Type": "application/json", "Authorization": "Bearer "+token},
                body: JSON.stringify({is_private: document.getElementById("privacyToggle").checked})
            });
        }

        function addH() {
            const val = document.getElementById("hIn").value.trim();
            if(!val) return;
            fetch("/api/habits", {
                method: "POST",
                headers: {"Content-Type": "application/json", "Authorization": "Bearer "+token},
                body: JSON.stringify({name: val})
            }).then(() => { document.getElementById("hIn").value = ""; load(); });
        }

        function toggleH(id) {
            fetch("/api/habits/"+id, {method: "PUT", headers: {"Authorization": "Bearer "+token}}).then(() => load());
        }

        function deleteH(id) {
            fetch("/api/habits/"+id, {method: "DELETE", headers: {"Authorization": "Bearer "+token}}).then(() => load());
        }

        function load() {
            document.getElementById("dispUser").innerText = myName;
            fetch("/api/user_info/"+myName, {headers: {"Authorization": "Bearer "+token}})
            .then(res => res.json()).then(data => {
                document.getElementById("privacyToggle").checked = data.is_private;
                document.getElementById("fwerL").innerText = data.follower_count + " Followers";
                document.getElementById("fwerL").href = `/user/${myName}/followers`;
                document.getElementById("fwingL").innerText = data.following_count + " Following";
                document.getElementById("fwingL").href = `/user/${myName}/following`;
            });

            fetch("/api/habits", {headers: {"Authorization": "Bearer "+token}})
            .then(res => res.json()).then(data => {
                const l = document.getElementById("list");
                l.innerHTML = "";
                data.forEach(h => {
                    let li = document.createElement("li");
                    li.innerHTML = `
                        <span style="text-decoration: ${h.completed ? 'line-through' : 'none'}">${h.name}</span>
                        <div class="item-actions">
                            <button onclick="toggleH(${h.id})">Toggle</button>
                            <button class="delete-btn" onclick="deleteH(${h.id})">Delete</button>
                        </div>
                    `;
                    l.appendChild(li);
                });
            });
        }
        window.onload = load;
    </script>
</body>
</html>
