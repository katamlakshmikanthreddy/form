<!DOCTYPE html>
<html>
<head>
    <title>My Habits</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input id="searchInput" placeholder="Search username...">
            <button onclick="searchUser()" style="width: 80px; margin-top: 10px; background-color: #5f6368;">Search</button>
        </div>

        <hr>

        <h2>My Habits</h2>
        <div style="display: flex; gap: 10px;">
            <input id="habitInput" placeholder="New habit name...">
            <button onclick="addHabit()" style="width: 80px; margin-top: 10px;">Add</button>
        </div>

        <ul id="list"></ul>

        <hr style="margin-top: 20px; border: 0; border-top: 1px solid #eee;">
        <button onclick="logout()" class="delete-btn">Logout</button>
    </div>

    <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/";

    function searchUser() {
        const user = document.getElementById("searchInput").value;
        if (user) window.location.href = `/other/${user}`;
    }

    function loadHabits() {
        fetch("/api/habits", {
            headers: { "Authorization": "Bearer " + token }
        })
        .then(res => res.status === 401 ? logout() : res.json())
        .then(data => {
            const list = document.getElementById("list");
            list.innerHTML = "";
            if (!data || data.length === 0) {
                list.innerHTML = "<li>No habits yet!</li>";
                return;
            }
            data.forEach(h => {
                let li = document.createElement("li");
                li.innerHTML = `
                    <span style="text-decoration: ${h.completed ? 'line-through' : 'none'}">
                        ${h.name} ${h.completed ? "✅" : "❌"}
                    </span>
                    <div class="item-actions">
                        <button onclick="toggle(${h.id})">Toggle</button>
                        <button class="delete-btn" onclick="deleteHabit(${h.id})">Delete</button>
                    </div>
                `;
                list.appendChild(li);
            });
        });
    }

    function addHabit() {
        const val = document.getElementById("habitInput").value;
        if(!val) return;
        fetch("/api/habits", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ name: val })
        }).then(() => {
            document.getElementById("habitInput").value = "";
            loadHabits();
        });
    }

    function toggle(id) {
        fetch("/api/habits/" + id, {
            method: "PUT",
            headers: { "Authorization": "Bearer " + token }
        }).then(() => loadHabits());
    }

    function deleteHabit(id) {
        fetch("/api/habits/" + id, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        }).then(() => loadHabits());
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "/";
    }

    window.onload = loadHabits;
    </script>
</body>
</html>
