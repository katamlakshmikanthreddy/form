<!DOCTYPE html>
<html>
<head>
    <title>New Group</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <h3>Create New Group</h3>
        <input id="gName" placeholder="Enter group name...">
        <div id="userList" style="max-height: 300px; overflow-y: auto; text-align: left; margin: 15px 0;"></div>
        <button onclick="createGroup()" style="background: #27ae60;">Create Group</button>
        <button onclick="window.location.href='/groups_page'" style="background: #5f6368; margin-top: 5px;">Cancel</button>
    </div>
    <script>
        const token = localStorage.getItem("token");
        fetch("/api/unique_contacts", { headers: {"Authorization": "Bearer "+token} })
        .then(res => res.json()).then(data => {
            const container = document.getElementById("userList");
            data.forEach(u => {
                let item = document.createElement("div");
                item.style.padding = "10px"; item.style.borderBottom = "1px solid #eee";
                item.innerHTML = `
                    <label style="display:flex; justify-content:space-between; width:100%; cursor:pointer;">
                        ${u.username}
                        <input type="checkbox" class="user-check" value="${u.id}" style="width:auto;">
                    </label>`;
                container.appendChild(item);
            });
        });

        function createGroup() {
        const name = document.getElementById("gName").value.trim();
        const checkboxes = document.querySelectorAll('.user-check:checked');
        const selected = Array.from(checkboxes).map(cb => cb.value);

        if(!name) {
            alert("Group name cannot be empty!");
            return;
        }
        if(selected.length < 2) {
            alert("Please select at least 2 members to create a group.");
            return;
        }

        fetch("/api/groups", {
            method: "POST",
            headers: {
                "Content-Type": "application/json", 
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({name: name, members: selected})
        })
        .then(res => {
            if(res.ok) {
                window.location.href = '/groups_page';
            } else {
                return res.json().then(err => { throw new Error(err.message) });
            }
        })
        .catch(err => alert("Error: " + err.message));
    }
    </script>
</body>
</html>
