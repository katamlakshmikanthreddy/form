<!DOCTYPE html>
<html>
<head>
    <title>Social List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2 id="hdr">List</h2>
        <ul id="uList"></ul>
        <button onclick="history.back()">Back</button>
    </div>
    <script>
        const token = localStorage.getItem("token"), myName = localStorage.getItem("username");
        const path = window.location.pathname.split('/'), type = path.pop(), user = path[path.length - 1];
        document.getElementById("hdr").innerText = user + "'s " + type;
        fetch(`/api/social/${user}/${type}`, {headers: {"Authorization": "Bearer "+token}})
        .then(res => res.json()).then(data => {
            const l = document.getElementById("uList");
            data.forEach(u => {
                let li = document.createElement("li");
                li.innerHTML = `<span onclick="window.location.href='/other/${u.username}'" style="cursor:pointer">${u.username}</span>`;
                if(user.toLowerCase() === myName.toLowerCase()){
                    let btn = document.createElement("button");
                    btn.innerText = "Remove"; btn.style.width = "auto"; btn.style.background = "#d93025";
                    btn.onclick = () => {
                        const ep = type === 'followers' ? 'remove_follower' : 'unfollow';
                        fetch(`/api/${ep}/${u.username}`, {method:"POST", headers:{"Authorization":"Bearer "+token}})
                        .then(() => location.reload());
                    };
                    li.appendChild(btn);
                }
                l.appendChild(li);
            });
        });
    </script>
</body>
</html>
