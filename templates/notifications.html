<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Follow Requests</h2>
        <ul id="rList"></ul>
        
        <hr>
        <h2>Followers</h2>
        <ul id="nList"></ul>
        
        <button onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>

    <script>
        const token = localStorage.getItem("token");
        const myName = localStorage.getItem("username");

        function handleRequest(rid, action) {
            fetch(`/api/request_action/${rid}/${action}`, {
                method: "POST",
                headers: {"Authorization": "Bearer " + token}
            })
            .then(() => loadAll());
        }

        function removeFollower(targetUser) {
            if(!confirm(`Remove ${targetUser}?`)) return;
            fetch(`/api/remove_follower/${targetUser}`, {
                method: "POST",
                headers: {"Authorization": "Bearer " + token}
            }).then(() => loadAll());
        }

        function loadAll() {
            // 1. Load Pending Requests
            fetch('/api/requests', { headers: {"Authorization": "Bearer " + token} })
            .then(res => res.json()).then(reqs => {
                const rl = document.getElementById("rList");
                rl.innerHTML = reqs.length ? "" : "<li style='color:#888'>No pending requests</li>";
                reqs.forEach(r => {
                    let li = document.createElement("li");
                    li.innerHTML = `
                        <div style="text-align:left">
                            <strong>${r.sender}</strong> wants to follow you
                        </div>
                        <div style="display:flex; gap:5px">
                            <button onclick="handleRequest(${r.id}, 'accept')" style="width:auto; background:#34a853; padding:5px 10px;">Accept</button>
                            <button onclick="handleRequest(${r.id}, 'reject')" style="width:auto; background:#d93025; padding:5px 10px;">Reject</button>
                        </div>`;
                    rl.appendChild(li);
                });
            });

            // 2. Load Followers
            fetch(`/api/social/${myName}/followers`, { headers: {"Authorization": "Bearer " + token} })
            .then(res => res.json()).then(data => {
                const nl = document.getElementById("nList");
                nl.innerHTML = data.length ? "" : "<li style='color:#888'>No followers yet</li>";
                data.forEach(u => {
                    let li = document.createElement("li");
                    li.innerHTML = `
                        <strong>${u.username}</strong>
                        <button onclick="removeFollower('${u.username}')" style="width:auto; background:#5f6368; padding:5px 10px; font-size:11px;">Remove</button>
                    `;
                    nl.appendChild(li);
                });
            });
        }

        window.onload = loadAll;
    </script>
</body>
</html>
