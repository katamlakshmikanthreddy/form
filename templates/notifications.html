<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div id="reqSec" style="display:none;">
            <h2>Follow Requests</h2>
            <ul id="rList"></ul>
            <hr>
        </div>

        <div id="remSec" style="display:none;">
            <h2>Habit Reminders</h2>
            <ul id="remList"></ul>
            <hr>
        </div>

        <div id="emptyMsg" style="padding:20px; color:#888;">No new notifications.</div>
        <button onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>

    <script>
        const token = localStorage.getItem("token");

        function loadAll() {
            let active = false;
            
            const p1 = fetch('/api/requests', { headers: {"Authorization": "Bearer "+token} })
                .then(res => res.json()).then(reqs => {
                    const rl = document.getElementById("rList");
                    rl.innerHTML = "";
                    if(reqs.length > 0) {
                        active = true;
                        document.getElementById("reqSec").style.display = "block";
                        reqs.forEach(r => {
                            let li = document.createElement("li");
                            li.innerHTML = `<span>${r.sender} wants to follow</span>
                                <div style="display:flex; gap:5px">
                                    <button onclick="reqAct(${r.id},'accept')" style="width:auto; background:green;">Accept</button>
                                    <button onclick="reqAct(${r.id},'reject')" style="width:auto; background:red;">Reject</button>
                                </div>`;
                            rl.appendChild(li);
                        });
                    } else document.getElementById("reqSec").style.display = "none";
                });

            const p2 = fetch('/api/notifications/reminders', { headers: {"Authorization": "Bearer "+token} })
                .then(res => res.json()).then(data => {
                    const list = document.getElementById("remList");
                    list.innerHTML = "";
                    if(data.received.length > 0 || data.acks.length > 0) {
                        active = true;
                        document.getElementById("remSec").style.display = "block";
                        data.received.forEach(r => {
                            let li = document.createElement("li");
                            li.innerHTML = `<span>${r.sender} reminded: ${r.habit}</span>
                                <button onclick="ackRem(${r.id})" style="width:auto; background:#1a73e8;">OK</button>`;
                            list.appendChild(li);
                        });
                        data.acks.forEach(a => {
                            let li = document.createElement("li");
                            li.style.background = "#e8f0fe";
                            li.innerHTML = `<span>${a.recipient} acknowledged: ${a.habit}</span>
                                <button onclick="clearRem(${a.id})" style="width:auto; background:#555;">Clear</button>`;
                            list.appendChild(li);
                        });
                    } else document.getElementById("remSec").style.display = "none";
                });

            Promise.all([p1, p2]).then(() => {
                document.getElementById("emptyMsg").style.display = active ? "none" : "block";
            });
        }

        function reqAct(rid, act) { fetch(`/api/request_action/${rid}/${act}`, {method:"POST", headers:{"Authorization":"Bearer "+token}}).then(loadAll); }
        function ackRem(rid) { fetch(`/api/remind/ack/${rid}`, {method:"POST", headers:{"Authorization":"Bearer "+token}}).then(loadAll); }
        function clearRem(rid) { fetch(`/api/remind/clear/${rid}`, {method:"DELETE", headers:{"Authorization":"Bearer "+token}}).then(loadAll); }

        window.onload = loadAll;
    </script>
</body>
</html>
