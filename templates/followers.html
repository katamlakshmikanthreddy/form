<!DOCTYPE html>
<html>
<head>
    <title>Social List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2 id="hdr">List</h2>
        <ul id="uList"></ul>
        <button onclick="history.back()">Back</button>
    </div>
    <script>
        const path = window.location.pathname.split('/');
        const type = path.pop(); 
        const user = path[path.length - 1];
        document.getElementById("hdr").innerText = user + "'s " + type;

        fetch(`/api/social/${user}/${type}`, {headers: {"Authorization": "Bearer "+localStorage.getItem("token")}})
        .then(res => res.json()).then(data => {
            const l = document.getElementById("uList");
            if(data.length === 0) l.innerHTML = "<li>No users found.</li>";
            data.forEach(u => {
                let li = document.createElement("li");
                li.innerText = u.username;
                li.style.cursor = "pointer";
                li.onclick = () => window.location.href = "/other/"+u.username;
                l.appendChild(li);
            });
        });
    </script>
</body>
</html>
